[tool.ruff]
line-length = 88
exclude = [
    "data",
    "notebooks",
    ".git",
    ".github",
    ".venv",
    "venv",
    "__pypackages__",
]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
]

[tool.ruff.lint.per-file-ignores]
"scripts/run_experiments.py" = ["E402"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
addopts = "-q"
